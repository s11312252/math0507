<!DOCTYPE html>
<html>
<head>
    <title>次方與根號計算器</title>
</head>
<body>
    <h1>次方與根號計算器</h1>
    <form action="/math" method="POST">
        <label>數字 x:</label>
        <input type="number" name="x" required><br><br>

        <label>運算符號:</label>
        <select name="opt">
            <option value="∧">∧ (次方)</option>
            <option value="√">√ (根號)</option>
        </select><br><br>

        <label>數字 y:</label>
        <input type="number" name="y" required><br><br>

        <button type="submit">開始計算</button>
    </form>

    {% if result is not none %}
        <hr>
        <h3>計算結果：{{ result }}</h3>
    {% endif %}

    <br>
    <a href="/">返回首頁</a>
</body>
</html>
